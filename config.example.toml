# SoundVisualizer server configuration.
# Copy to config.toml and edit. config.toml is gitignored.
# Defaults match Paweł's calibration of OUR specific Tyto Robotics 1585 unit.

[server]
host = "0.0.0.0"             # 0.0.0.0 = reachable on the LAN (e.g. soundvis.local)
port = 8000

[tyto]
enabled = false              # set true once the stand is plugged in
tty = "/dev/ttyUSB0"
poll_period_seconds = 0.03   # ~33 Hz; matches Paweł's loop

[tyto.calibration]
hinge_distance = 0.07492
cal_poles = 14
cal_hinge_left = 1.2100092475098374
cal_hinge_right = 1.2590952216896254
cal_left = 0.9663293361785854
cal_right = -0.9575068323376389
cal_thrust = -0.9516456828857573

# Research-tree integration — surface linked research-tree editors as a
# node-preset picker in the Capture wizard, and push the SoundVis Results URL
# back into the picked node on a successful capture (status auto-flips to
# 'in-progress'). Multiple trees are supported; node IDs must be unique across
# trees (the backend routes a push by looking up which tree owns the id).
#
# The legacy singular [research_tree] table is still accepted (it folds into a
# single entry named "default") but prefer the [[research_trees]] form below.
[[research_trees]]
name = "duct"
enabled = false
base_url = "http://localhost:8123"   # research-tree's serve.py, reachable to SoundVis
public_url = ""                       # browser-side base for SoundVis Results — empty = same origin

[[research_trees]]
name = "drone-paczek"
enabled = false
base_url = "http://localhost:8124"
public_url = ""
